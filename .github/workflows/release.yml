name: Full Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-all:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Create appsettings.json from Secrets
        shell: bash
        run: |
          echo '${{ secrets.APPSETTINGS_API_JSON }}' > ./Messenger.API/appsettings.json
          echo '${{ secrets.APPSETTINGS_WEB_JSON }}' > ./Messenger.Web/appsettings.json

      - name: Publish Windows
        run: |
          dotnet publish ./Messenger.API/Messenger.API.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o ./publish/win-x64/Messenger.API
          dotnet publish ./Messenger.Web/Messenger.Web.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o ./publish/win-x64/Messenger.Web

      - name: Publish Linux
        run: |
          dotnet publish ./Messenger.API/Messenger.API.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o ./publish/linux-x64/Messenger.API
          dotnet publish ./Messenger.Web/Messenger.Web.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o ./publish/linux-x64/Messenger.Web
          
      - name: Compile Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q /DAppVersion=${{ github.ref_name }} ./Deployment/Messenger.iss
          
      - name: Prepare Artifacts with Version
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          
          cd publish/win-x64 && zip -r "../../Messenger-$TAG-Windows-x64.zip" . && cd ../..
          
          tar -czf "Messenger-$TAG-Linux-x64.tar.gz" -C ./publish/linux-x64 .
          
          mv ./Deployment/Output/Messenger-Setup.exe "./Messenger-$TAG-Setup.exe"
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Messenger-${{ github.ref_name }}-Windows-x64.zip
            Messenger-${{ github.ref_name }}-Linux-x64.tar.gz
            Messenger-${{ github.ref_name }}-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}